name: Sextant Grid Simulation Execution

on:
  workflow_dispatch:
    inputs:
      trigger_node:
        description: "Failure injection node"
        required: false
        default: "none"
      load_profile:
        description: "Grid load profile"
        required: false
        default: "baseline"

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (if available)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "No requirements.txt found"; fi

      - name: Ensure output directory exists
        run: |
          mkdir -p sandbox_validation/outputs

      - name: Run Grid Simulation
        run: |
          python -m sandbox_validation.test_runs.run_simulation \
            --trigger_node "${{ inputs.trigger_node }}" \
            --load_profile "${{ inputs.load_profile }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simulation-output
          path: sandbox_validation/outputs/
