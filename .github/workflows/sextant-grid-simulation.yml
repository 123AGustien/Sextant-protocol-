   name: Sextant Grid Simulation Execution

on:
  workflow_dispatch:
    inputs:
      trigger_node:
        description: "Failure injection node (optional sandbox parameter)"
        required: false
        default: "none"
      load_profile:
        description: "Grid load profile (baseline / stress / peak)"
        required: false
        default: "baseline"

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute Sextant Grid Simulation (Sandbox Mode)
        run: |
          set -euo pipefail

          echo "======================================"
          echo "Sextant Grid Simulation Execution"
          echo "======================================"
          echo "Trigger Node  : ${{ inputs.trigger_node }}"
          echo "Load Profile  : ${{ inputs.load_profile }}"
          echo "Timestamp     : $(date -u)"
          echo "Repo Path     : $(pwd)"
          echo "--------------------------------------"

          python3 sandbox_validation/run_grid.py \
            --trigger_node "${{ inputs.trigger_node }}" \
            --load_profile "${{ inputs.load_profile }}"

          echo "--------------------------------------"
          echo "Execution Completed Successfully"
          echo "======================================" 
