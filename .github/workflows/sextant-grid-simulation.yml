name: Sextant Grid Simulation Execution

on:
  workflow_dispatch:
    inputs:
      trigger_node:
        description: "Failure injection node"
        required: false
        default: "none"
      load_profile:
        description: "Grid load profile"
        required: false
        default: "baseline"

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute Grid Simulation
        run: |
          echo "=== Sextant Grid Execution Start ==="
          echo "Trigger Node: ${{ inputs.trigger_node }}"
          echo "Load Profile: ${{ inputs.load_profile }}"
          echo "Timestamp: $(date)"

          if python sandbox_validation/test_runs/run_grid.py \
            --trigger_node "${{ inputs.trigger_node }}" \
            --load_profile "${{ inputs.load_profile }}"; then

            echo "SUCCESS"

          else

            echo "WARNING"

          fi
